[build]
  command = "corepack enable && corepack prepare pnpm@9.15.0 --activate && pnpm install && pnpm --filter @thread-to-pdf/shared build && pnpm --filter @thread-to-pdf/web build"
  publish = "apps/web/dist"

[build.environment]
  NODE_VERSION = "20"

# SPA routing — send all page routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
