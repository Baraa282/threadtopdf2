services:
  - type: web
    name: threadtopdf-api
    runtime: node
    plan: free
    buildCommand: npm install -g pnpm@9.15.0 && pnpm install && pnpm --filter @thread-to-pdf/shared build && pnpm --filter @thread-to-pdf/server build && node apps/server/scripts/ensure-chrome.mjs
    startCommand: node apps/server/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/src/.cache/puppeteer
